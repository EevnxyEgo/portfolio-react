<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set the theme before paint to avoid a flash. Defaults to dark (the brand);
      // honors the visitor's saved choice.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t !== 'light' && t !== 'dark') t = 'dark'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
