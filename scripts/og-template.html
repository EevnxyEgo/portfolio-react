<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');
      * { margin: 0; box-sizing: border-box; }
      body { width: 1200px; height: 630px; background: #14120d; color: #ece4d2; font-family: 'Hanken Grotesk', sans-serif; }
      .frame { width: 100%; height: 100%; padding: 66px 72px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
      .top { display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #9a8f73; }
      .dot { display: inline-flex; align-items: center; gap: 10px; color: #34d399; }
      .dot i { width: 11px; height: 11px; border-radius: 50%; background: #5ff0bc; display: inline-block; }
      h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 116px; line-height: 0.95; letter-spacing: -0.03em; }
      .sub { font-size: 30px; color: #b3a88f; margin-top: 22px; max-width: 26ch; line-height: 1.3; }
      .sub b { color: #34d399; font-weight: 500; }
      .log { font-family: 'JetBrains Mono', monospace; font-size: 19px; color: #9a8f73; display: flex; gap: 22px; align-items: center; }
      .log .g { color: #34d399; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="top">
        <span style="letter-spacing: 0.14em">aawd</span>
        <span class="dot"><i></i>open to work</span>
      </div>
      <div>
        <h1>Arsenius<br />Audley</h1>
        <p class="sub">Full-stack developer who <b>finishes</b> what he starts.</p>
      </div>
      <div class="log">
        <span class="g">● deployed</span>
        <span>3 shipped · 318 commits · indonesia / remote</span>
      </div>
    </div>
  </body>
</html>
