<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap');
      * { margin: 0; box-sizing: border-box; }
      body { width: 1200px; height: 630px; background: #f4f1ea; color: #16140f; font-family: 'Hanken Grotesk', sans-serif; }
      .frame { width: 100%; height: 100%; padding: 64px 72px; display: flex; flex-direction: column; justify-content: space-between; }
      .top { display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #5e5749; }
      .dot { display: inline-flex; align-items: center; gap: 10px; color: #0f6b47; }
      .dot i { width: 11px; height: 11px; border-radius: 50%; background: #1fa971; display: inline-block; }
      h1 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 86px; line-height: 1.0; letter-spacing: -0.02em; }
      .sub { font-size: 30px; color: #403a2e; margin-top: 18px; max-width: 22ch; line-height: 1.3; }
      .log { font-family: 'JetBrains Mono', monospace; font-size: 19px; color: #5e5749; display: flex; gap: 22px; align-items: center; }
      .log .g { color: #0f6b47; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="top">
        <span style="letter-spacing: 0.14em">aawd</span>
        <span class="dot"><i></i>open to work</span>
      </div>
      <div>
        <h1>Arsenius Audley</h1>
        <p class="sub">Full-stack developer who finishes what he starts.</p>
      </div>
      <div class="log">
        <span class="g">● deployed</span>
        <span>3 shipped · 318 commits · jun 2026</span>
        <span>indonesia / remote</span>
      </div>
    </div>
  </body>
</html>
